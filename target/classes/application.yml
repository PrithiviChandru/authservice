#Server Port
server:
  port: ${PORT}

#Database Credentials
spring:
  application:
    name: authservice
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
  jpa:
    database-platform: org.hibernate.dialect.MySQLDialect
    hibernate:
      ddl-auto: create
    show-sql: false

#Token Properties
jwt:
  secret: ${JWT_SECRET}
  expiration: ${JWT_EXPIRATION}